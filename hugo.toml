baseURL = 'https://bertobi.github.io/blog/'
languageCode = 'en-us'
title = "Tobias's Blog"

[params]
  name = 'Tobias'
  author = 'Tobias'
  description = 'AI Safety research, retro-computing and low level programming.'
  bio = 'I do AI Safety research and play around with old hardware.'
  # Analytics: your GoatCounter site code (e.g. 'tobiasblog' for tobiasblog.goatcounter.com).
  # Leave empty to disable. Create a free site at https://www.goatcounter.com.
  goatcounter = 'tobi19'

# Comments via Giscus (GitHub Discussions). Requires the giscus app installed on
# the repo: https://github.com/apps/giscus  — set `comments = false` in a post's
# front matter to hide comments on that post.
[params.giscus]
  repo = 'BerTobi/blog'
  repoId = 'R_kgDORsnHwA'
  category = 'Announcements'
  categoryId = 'DIC_kwDORsnHwM4C_VJP'
  mapping = 'pathname'
  reactionsEnabled = '1'
  theme = 'preferred_color_scheme'

[markup.goldmark.renderer]
  unsafe = true   # allow raw HTML in posts (e.g. images inserted by the publisher)

[markup.highlight]
  noClasses = false
  guessSyntax = true
