{{ define "main" }}
<div class="seclabel"><span class="pr">&gt;</span> {{ .Title | lower }} <span class="rule"></span></div>
{{- with .Content }}<div class="content">{{ . }}</div>{{ end }}
<ul class="posts">
  {{- range .Pages }}
    {{ partial "postcard.html" . }}
  {{- else }}
    <li><p class="dek">Nothing here yet.</p></li>
  {{- end }}
</ul>
{{ end }}
